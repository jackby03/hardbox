---
galaxy_info:
  role_name: hardbox
  author: jackby03
  description: >
    Ansible role to install, configure, and run hardbox — a Linux system
    hardening tool with built-in compliance profiles (CIS, NIST, STIG,
    PCI-DSS, HIPAA, ISO 27001, and cloud provider benchmarks).
  license: AGPL-3.0
  min_ansible_version: "2.14"

  platforms:
    - name: Ubuntu
      versions:
        - jammy       # 22.04 LTS
        - focal       # 20.04 LTS
    - name: Debian
      versions:
        - bullseye    # 11
        - bookworm    # 12
    - name: EL
      versions:
        - "8"
        - "9"

  galaxy_tags:
    - security
    - hardening
    - compliance
    - cis
    - nist
    - stig
    - pci
    - hipaa

dependencies: []
