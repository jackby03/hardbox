name: Release Publish
permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional existing tag to release (example: v0.1.1-rc1)"
        required: false
        type: string

jobs:
  publish:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag exists for manual dispatch
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
        run: |
          git fetch --tags --force
          if ! git rev-parse "${{ github.event.inputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ github.event.inputs.tag }} does not exist in this repository."
            exit 1
          fi
          git checkout "${{ github.event.inputs.tag }}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check --config .goreleaser.yaml

      - name: Publish release artifacts with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
