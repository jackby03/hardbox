# ACS Permission Policy v1.0 — hardbox
#
# Evaluation order:
#   1. deny rules checked first  → access blocked if matched
#   2. allow rules checked next  → access granted if matched
#   3. default: deny             → no match = blocked

deny:
  read:
    - "*.pem"
    - "*.key"
    - "*.p12"
    - "*.pfx"
    - ".env"
    - ".env.*"
    - "secrets/**"
    - "**/.ssh/**"
  write:
    # Secrets / credentials — never modified by agents
    - "*.pem"
    - "*.key"
    - "*.p12"
    - "*.pfx"
    - ".env"
    - ".env.*"
    - "secrets/**"
    # go.sum must be regenerated by `go mod tidy`, not patched by agents
    - "go.sum"
    # CI workflows — require human review before changes
    - ".github/workflows/**"

allow:
  read:
    - "**"
  write:
    # Go source
    - "cmd/**"
    - "internal/**"
    # Configuration profiles
    - "configs/**"
    # Documentation
    - "docs/**"
    # ACS configuration itself
    - ".agents/**"
    # Test files
    - "**/*_test.go"
    # Root project files (README, CHANGELOG, etc.)
    - "*.md"
    - "*.yaml"
    - "*.yml"
    - "Makefile"
    - "go.mod"
    - ".goreleaser.yaml"
