# CIS Benchmark Level 2 Profile
# High-security baseline — intended for servers that handle sensitive data or
# require strict regulatory compliance. May impact availability; review each
# setting against your workload before applying.
# Reference: CIS Ubuntu Linux 22.04 LTS Benchmark v1.0.0 (Level 2)
#
# Level 2 includes all Level 1 controls plus additional restrictions.
# Differences from cis-level1 are noted inline.

version: "1"
profile: cis-level2
environment: onprem

modules:
  ssh:
    enabled: true
    # CIS 5.2.x — SSH server hardening (Level 2 tightens several thresholds)
    max_auth_tries: 3              # L2: 3 (L1 allows 4)
    login_grace_time: 30           # L2: 30s (L1 allows 60s)
    client_alive_interval: 300     # CIS 5.2.17
    client_alive_count_max: 3
    max_sessions: 4                # L2: restrict concurrent sessions
    disable_root_login: true       # CIS 5.2.8
    disable_empty_passwords: true  # CIS 5.2.11
    disable_x11_forwarding: true   # CIS 5.2.4
    disable_hostbased_auth: true   # CIS 5.2.9
    disable_ignore_rhosts: true    # CIS 5.2.10
    disable_tcp_forwarding: true   # L2 addition: CIS 5.2.21
    disable_agent_forwarding: true # L2 addition
    log_level: VERBOSE             # L2: VERBOSE required (L1 allows INFO)
    # CIS 5.2.13 — strong ciphers only (same as L1)
    ciphers:
      - aes128-ctr
      - aes192-ctr
      - aes256-ctr
      - aes128-gcm@openssh.com
      - aes256-gcm@openssh.com
      - chacha20-poly1305@openssh.com
    # CIS 5.2.14 — ETM MACs only (same as L1)
    macs:
      - hmac-sha2-256-etm@openssh.com
      - hmac-sha2-512-etm@openssh.com
    # L2 addition: restrict key exchange to safe algorithms
    kex_algorithms:
      - curve25519-sha256
      - curve25519-sha256@libssh.org
      - diffie-hellman-group14-sha256
      - diffie-hellman-group16-sha512
      - diffie-hellman-group18-sha512

  firewall:
    enabled: true
    backend: auto                  # auto-detect: ufw | nftables | firewalld
    default_inbound: drop          # CIS 3.5.x
    default_outbound: drop         # L2: also restrict egress by default
    log_dropped: true              # L2: log all dropped packets

  kernel:
    enabled: true
    # All Level 1 sysctl checks apply; Level 2 adds:
    # - Full ASLR (kernel.randomize_va_space = 2)
    # - Restrict kernel pointers (kernel.kptr_restrict = 2)
    # - Disable magic SysRq (kernel.sysrq = 0)
    # - Restrict dmesg (kernel.dmesg_restrict = 1)
    # - Restrict ptrace (kernel.yama.ptrace_scope = 1)
    # - Disable core dumps (fs.suid_dumpable = 0)
    # Individual sysctl checks are enforced inside the kernel module.

  users:
    enabled: true
    # CIS 5.4.x — password policy (Level 2 is stricter)
    password_max_days: 90          # L2: 90 days (L1: 365)
    password_min_days: 7           # L2: 7 days (L1: 1)
    password_warn_age: 14          # L2: 14 days (L1: 7)
    password_min_length: 14        # CIS 5.4.3
    password_complexity: true      # L2: require complexity (uppercase, digit, symbol)
    password_history: 5            # L2: prevent reuse of last 5 passwords
    lockout_attempts: 3            # L2: 3 attempts (L1: 5)
    lockout_duration: 900          # seconds (15 min)
    inactive_account_lock_days: 30 # CIS 5.4.1.4
    su_restricted: true            # L2: restrict su to wheel/sudo group only
    umask: "027"                   # L2: 027 (L1: 022)

  filesystem:
    enabled: true
    # CIS 1.1.x — mount option hardening
    tmp_nosuid: true               # CIS 1.1.3
    tmp_nodev: true                # CIS 1.1.4
    tmp_noexec: true               # CIS 1.1.5
    devshm_nosuid: true            # CIS 1.1.16
    devshm_nodev: true             # CIS 1.1.17
    devshm_noexec: true            # CIS 1.1.18
    # L2 additions — extra partitions and unused filesystems
    var_nosuid: true               # CIS 1.1.11
    var_nodev: true                # CIS 1.1.12
    var_tmp_nosuid: true           # CIS 1.1.8
    var_tmp_nodev: true            # CIS 1.1.9
    var_tmp_noexec: true           # CIS 1.1.10
    home_nosuid: true              # CIS 1.1.21
    home_nodev: true               # CIS 1.1.22
    # L2: disable unused/exotic filesystems
    disable_cramfs: true           # CIS 1.1.1.1
    disable_freevxfs: true         # CIS 1.1.1.2
    disable_jffs2: true            # CIS 1.1.1.3
    disable_hfs: true              # CIS 1.1.1.4
    disable_hfsplus: true          # CIS 1.1.1.5
    disable_squashfs: true         # CIS 1.1.1.6
    disable_udf: true              # CIS 1.1.1.7

  auditd:
    enabled: true
    # CIS 4.1.x — audit logging (Level 2 requires comprehensive audit rules)
    max_log_file_size: 32          # MB (L1: 8)
    num_logs: 5                    # keep 5 rotated log files
    action_on_space_left: halt     # L2: halt on low disk (L1: email)
    space_left_mb: 75
    immutable: true                # L2: lock audit config (requires reboot to change)
    # L2 audit rules — track privileged actions and file changes
    audit_privileged_commands: true  # CIS 4.1.12 — setuid/setgid binaries
    audit_file_access: true          # CIS 4.1.9  — unauthorised file access attempts
    audit_user_events: true          # CIS 4.1.4  — login/logout/session events
    audit_sudo_commands: true        # CIS 4.1.3  — all commands run via sudo
    audit_network_changes: true      # CIS 4.1.7  — sysadmin network config changes
    audit_time_change: true          # CIS 4.1.2  — system time modifications

  services:
    enabled: true
    # CIS 2.x — disable unnecessary services (L2 disables more than L1)
    disable:
      - xinetd
      - inetd
      - avahi-daemon
      - cups
      - dhcpd
      - slapd
      - nfs-server
      - bind
      - vsftpd
      - httpd
      - apache2
      - nginx
      - dovecot
      - sendmail
      - samba
      - squid
      - snmpd
      - nis
      - telnet
      - rsh-server
      - rsync
      - tftp-server         # L2 addition
      - talk                # L2 addition
      - chargen             # L2 addition
      - daytime             # L2 addition
      - echo                # L2 addition
      - discard             # L2 addition

  network:
    enabled: true
    # CIS 3.2–3.5 — network protocol hardening
    disable_ipv6: true             # L2: disable if not in use (L1: false)
    disable_wireless: true         # CIS 3.7
    disable_dccp: true             # CIS 3.4.1
    disable_sctp: true             # CIS 3.4.2
    disable_rds: true              # CIS 3.4.3
    disable_tipc: true             # CIS 3.4.4
    disable_bluetooth: true        # L2 addition: disable Bluetooth on servers

  crypto:
    enabled: true
    min_tls_version: "1.2"         # reject TLS 1.0 and 1.1
    disable_weak_ciphers: true     # remove RC4, DES, 3DES, NULL suites
    disable_weak_hashes: true      # L2: reject MD5, SHA-1 for signing

  logging:
    enabled: true
    # CIS 4.2.x — logging (Level 2 requires remote forwarding)
    log_retention_days: 365        # L2: 1 year (L1: 90 days)
    remote_log_host: ""            # set your syslog/SIEM server IP/hostname
    remote_log_protocol: tcp       # L2: TCP for reliable delivery

  mac:
    enabled: true
    # CIS 1.6 — Mandatory Access Control
    enforce: true                  # all profiles in enforce mode
    deny_unknown: true             # L2: deny any process without a policy

  ntp:
    enabled: true
    backend: auto                  # auto: chrony | systemd-timesyncd
    timezone: UTC

  updates:
    enabled: true
    # CIS 1.9 — keep software up to date
    unattended_security_upgrades: true

  containers:
    enabled: false                 # enable only when Docker/Podman is in use

report:
  format: html
  output_dir: /var/lib/hardbox/reports
  include_remediation: true
  include_evidence: true           # L2: include raw evidence in reports

audit:
  fail_on_critical: true
  fail_on_high: true               # L2: also fail on high-severity findings
  fail_on_medium: false
