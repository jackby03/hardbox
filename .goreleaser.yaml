project_name: hardbox

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: hardbox
    main: ./cmd/hardbox
    binary: hardbox
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "hardbox_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - configs/**

checksum:
  name_template: "hardbox_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: hardbox-io
    name: hardbox
  name_template: "v{{.Version}}"
